<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fashion Website</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <nav>

        <h1 class="logo">loomé.</h1>

        <ul>
            <li>Home</li>
            <li class="active">Shop</li>
            <li>Collection</li>
            <li>About</li>
            <li>Contact</li>
        </ul>

        <div class="icons">
            <i class="fa-solid fa-bag-shopping"></i>
            <i class="fa-solid fa-bars"></i>
        </div>

    </nav>

    <div class="main">

        <div class="left">

            <p class="new">NEW COLLECTION</p>

            <h1>a cotton weave</h1>

            <p class="text">
                Crafted from 100% organic cotton with a soft,
                breathable feel.
            </p>

            <h3>Colors</h3>

            <div class="colors">
                <div class="green"></div>
                <div class="white"></div>
                <div class="pink"></div>
            </div>

            <h3>Details</h3>

            <p class="text">
                Soft cotton scarf perfect for all seasons
                and everyday fashion.
            </p>

        </div>

        <div class="center">

            <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=1200&auto=format&fit=crop">

            <button>Add to Bag</button>

        </div>

        <div class="right">

            <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=500">

            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=500">

            <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=500">

        </div>

    </div>

</body>
</html>
